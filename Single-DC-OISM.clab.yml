name: Single-DC-OISM

mgmt:
  network: mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  # defaults:
  #   env:
  #     INTFTYPE: et

  kinds:
    arista_ceos:
      image: ceos:4.35.0F
      env:
        CLAB_MGMT_VRF: MGMT
    linux:
      image: ghcr.io/aristanetworks/aclabs/host-ubuntu:rev1.0

  nodes:
    A-Spine1:
      kind: arista_ceos
      mgmt-ipv4: 172.20.20.10
      binds:
        - sn/a-spine1.txt:/mnt/flash/ceos-config:ro
      startup-config: configs/A-Spine1.cfg
      ports:
        - '22010:22'
        - '8010:80'
        - '44310:443'

    A-Leaf1:
      kind: arista_ceos
      mgmt-ipv4: 172.20.20.11
      binds:
        - sn/a-leaf1.txt:/mnt/flash/ceos-config:ro
      startup-config: configs/A-Leaf1.cfg
      ports:
        - '22011:22'
        - '8011:80'
        - '44311:443'

    A-Leaf2:
      kind: arista_ceos
      mgmt-ipv4: 172.20.20.12
      binds:
        - sn/a-leaf2.txt:/mnt/flash/ceos-config:ro
      startup-config: configs/A-Leaf2.cfg
      ports:
        - '22012:22'
        - '8012:80'
        - '44312:443'

    A-Leaf3:
      kind: arista_ceos
      mgmt-ipv4: 172.20.20.13
      binds:
        - sn/a-leaf3.txt:/mnt/flash/ceos-config:ro
