  links:
    - endpoints: [ "A-Leaf1:eth1", "A-Spine1:eth1" ]
    - endpoints: [ "A-Leaf2:eth1", "A-Spine1:eth2" ]
    - endpoints: [ "A-Leaf3:eth1", "A-Spine1:eth3" ]
    - endpoints: [ "A-Leaf4:eth1", "A-Spine1:eth4" ]
    - endpoints: [ "A-Leaf5:eth1", "A-Spine1:eth5" ]
    - endpoints: [ "A-Leaf6:eth1", "A-Spine1:eth6" ]
    - endpoints: [ "A-Leaf1:eth6", "A-SW1:eth1" ]
    - endpoints: [ "A-Leaf2:eth6", "A-SW1:eth2" ]
    - endpoints: [ "A-Leaf4:eth6", "R1:eth1" ]
    - endpoints: [ "A-Leaf5:eth6", "R2:eth1" ]
    - endpoints: [ "A-Leaf6:eth6", "R2:eth2" ]
    - endpoints: [ "Host1:eth1", "A-SW1:eth3" ]
