      mgmt-ipv4: 172.20.20.14
      binds:
        - sn/a-leaf4.txt:/mnt/flash/ceos-config:ro
      startup-config: configs/A-Leaf4.cfg
      ports:
        - '22014:22'
        - '8014:80'
        - '44314:443'

    A-Leaf5:
      kind: arista_ceos
      mgmt-ipv4: 172.20.20.15
      binds:
        - sn/a-leaf5.txt:/mnt/flash/ceos-config:ro
